<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owlvy's Moon Phase Simulator V3.02</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #38bdf8;
        }
        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            background-color: var(--panel-bg);
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 1100px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid #334155;
        }

        /* 1. มุมมองจากโลก (Horizon View) */
        .horizon-view {
            height: 350px;
            position: relative;
            background: #87CEEB; 
            overflow: hidden;
            transition: background 0.5s ease;
        }
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #14532d, #064e3b);
            border-top: 4px solid #16a34a;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            align-items: center;
            z-index: 100;
        }
        .direction-label {
            font-weight: 600;
            color: #bbf7d0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            font-size: 16px;
        }

        /* น้อง Owlvy มุมมองจากโลก */
        .owlvy-observer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            z-index: 110;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .sky-dome {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 250px;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 50% 50% 0 0;
            pointer-events: none;
        }

        .sun-horizon {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #fde047;
            border-radius: 50%;
            box-shadow: 0 0 60px #ea580c;
            z-index: 10;
            transition: all 0.1s linear;
        }

        .moon-horizon {
            position: absolute;
            width: 50px;
            height: 50px;
            z-index: 20;
            transition: all 0.1s linear;
        }

        /* 2. ส่วนล่าง */
        .bottom-section {
            display: flex;
            min-height: 420px;
            background: #020617;
        }
        .space-view {
            flex: 1.6;
            position: relative;
            border-right: 2px solid #334155;
            overflow: hidden;
        }
        .info-panel {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            background: #0f172a;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .sky-label {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            z-index: 50;
        }

        canvas { display: block; }

        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 15px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        select, input[type="range"] {
            width: 100%;
            background: #1e293b;
            color: white;
            border: 1px solid #475569;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }
        .readout {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            margin-top: 10px;
        }
        .readout strong { color: var(--accent); font-size: 22px; }
    </style>
</head>

            <div style="text-align:center;">
                <h3 style="margin-top: 0; color: #fff; font-size: 16px;">3. สัดส่วนการส่องสว่าง (Moon Phase)</h3>
                <canvas id="phaseCanvas" width="130" height="130" style="margin: 0 auto;"></canvas>

<script>
    const CYCLE = 29.53;
    let days = 4; 
    let hour = 18; 

    const timeSlider = document.getElementById('timeSlider');
    const daySlider = document.getElementById('daySlider');
    const horizonView = document.getElementById('horizonView');
    const moonSky = document.getElementById('moonSky');
    const sun = document.getElementById('sun');
    
    const spaceCanvas = document.getElementById('spaceCanvas');
    const spaceCtx = spaceCanvas.getContext('2d');
    const phaseCanvas = document.getElementById('phaseCanvas');
    const phaseCtx = phaseCanvas.getContext('2d');
    const moonSkyCtx = moonSky.getContext('2d');

    function init() {
        resize();
        update();
    }

    function resize() {
        spaceCanvas.width = spaceCanvas.parentElement.clientWidth;
        spaceCanvas.height = spaceCanvas.parentElement.clientHeight;
    }

    function getRelAngle(celestial, observer) {
        let diff = celestial - observer;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        return diff;
    }

    function update() {
        const phaseFraction = days / CYCLE;
        
        const sunAngle = Math.PI; 
        const moonAngle = Math.PI - (phaseFraction * Math.PI * 2);
        const obsAngle = Math.PI - ((hour - 12) / 24) * Math.PI * 2;

        document.getElementById('timeVal').textContent = formatTime(hour);
        document.getElementById('dayVal').textContent = days.toFixed(1);
        document.getElementById('dayPhaseVal').textContent = "(" + getLunarThai(days) + ")";
        
        const illuPct = ((1 - Math.cos(phaseFraction * Math.PI * 2)) / 2) * 100;
        document.getElementById('illu').textContent = illuPct.toFixed(0) + "%";
        document.getElementById('phaseName').textContent = getPhaseName(days);

        updateHorizon(sunAngle, moonAngle, obsAngle);
        drawSpace(moonAngle, obsAngle);
        
        drawMoonPhase(phaseCtx, phaseCanvas.width, phaseFraction);
        drawMoonPhase(moonSkyCtx, moonSky.width, phaseFraction);
    }

    function updateHorizon(sunAngle, moonAngle, obsAngle) {
        const w = horizonView.clientWidth;
        const groundH = 60;
        const skyH = 250; 

        let sunRel = getRelAngle(sunAngle, obsAngle);
        let sunX = (w / 2) + (sunRel / (Math.PI / 2)) * (w / 2);
        let sunY = Math.cos(sunRel) * skyH; 
        sun.style.left = (sunX - 30) + "px";
        sun.style.bottom = (sunY + groundH - 30) + "px";

        let moonRel = getRelAngle(moonAngle, obsAngle);
        let moonX = (w / 2) + (moonRel / (Math.PI / 2)) * (w / 2);
        let moonY = Math.cos(moonRel) * skyH;
        moonSky.style.left = (moonX - 25) + "px";
        moonSky.style.bottom = (moonY + groundH - 25) + "px";

        // ปรับสีท้องฟ้ากลางวันให้สว่างสดใส (ฟ้าอ่อน) แยกชัดเจนจากกลางคืน
        let skyColor;
        if (sunY > 50) skyColor = "linear-gradient(to bottom, #38bdf8, #bae6fd)"; // Day (สว่างสดใส)
        else if (sunY > -20 && sunY <= 50) skyColor = "linear-gradient(to bottom, #ea580c, #fde047)"; // Twilight
        else skyColor = "linear-gradient(to bottom, #020617, #0f172a)"; // Night
        horizonView.style.background = skyColor;
    }

    function drawSpace(moonAngle, obsAngle) {
        const w = spaceCanvas.width, h = spaceCanvas.height;
        const cx = w/2 + 50, cy = h/2; 
        const orbitR = 120;
        spaceCtx.clearRect(0,0,w,h);

        spaceCtx.fillStyle = "#fde047";
        spaceCtx.font = "bold 16px Prompt";
        spaceCtx.fillText("☀️ แสงจากดวงอาทิตย์", 20, 30);
        
        for(let i=0; i<6; i++) {
            let y = cy - 100 + i*40;
            spaceCtx.beginPath();
            spaceCtx.moveTo(20, y);
            spaceCtx.lineTo(cx - 150, y);
            spaceCtx.strokeStyle = "rgba(253,224,71,0.6)";
            spaceCtx.lineWidth = 3;
            spaceCtx.stroke();
            spaceCtx.beginPath();
            spaceCtx.moveTo(cx - 150, y);
            spaceCtx.lineTo(cx - 165, y - 8);
            spaceCtx.lineTo(cx - 165, y + 8);
            spaceCtx.fillStyle = "rgba(253,224,71,0.6)";
            spaceCtx.fill();
        }

        spaceCtx.beginPath();
        spaceCtx.arc(cx,cy, orbitR, 0, Math.PI*2);
        spaceCtx.strokeStyle = "rgba(255,255,255,0.2)";
        spaceCtx.setLineDash([5,5]);
        spaceCtx.stroke();
        spaceCtx.setLineDash([]);

        const earthR = 35;
        spaceCtx.beginPath();
        spaceCtx.arc(cx,cy, earthR, 0, Math.PI*2);
        spaceCtx.fillStyle = "#0ea5e9"; 
        spaceCtx.fill();
        spaceCtx.beginPath();
        spaceCtx.arc(cx,cy, earthR, -Math.PI/2, Math.PI/2);
        spaceCtx.fillStyle = "rgba(0,0,0,0.65)";
        spaceCtx.fill();

        spaceCtx.save();
        spaceCtx.translate(cx, cy);
        spaceCtx.rotate(obsAngle);

        spaceCtx.fillStyle = "#000000";
        spaceCtx.strokeStyle = "#000000";

        spaceCtx.beginPath();
        spaceCtx.ellipse(earthR + 6, 0, 7, 10, 0, 0, Math.PI*2);
        spaceCtx.fill();
        spaceCtx.beginPath();
        spaceCtx.arc(earthR + 15, 0, 7, 0, Math.PI*2);
        spaceCtx.fill();

        spaceCtx.beginPath();
        spaceCtx.moveTo(earthR + 17, -5);
        spaceCtx.lineTo(earthR + 22, -8);
        spaceCtx.lineTo(earthR + 14, -2);
        spaceCtx.fill();
        spaceCtx.beginPath();
        spaceCtx.moveTo(earthR + 17, 5);
        spaceCtx.lineTo(earthR + 22, 8);
        spaceCtx.lineTo(earthR + 14, 2);
        spaceCtx.fill();

        spaceCtx.lineWidth = 3;
        spaceCtx.lineCap = "round";
        spaceCtx.beginPath();
        spaceCtx.moveTo(earthR + 8, -7);
        spaceCtx.lineTo(earthR + 8, -28); 
        spaceCtx.stroke();
        spaceCtx.beginPath();
        spaceCtx.moveTo(earthR + 8, 7);
        spaceCtx.lineTo(earthR + 8, 28); 
        spaceCtx.stroke();

        spaceCtx.beginPath();
        spaceCtx.arc(earthR + 8, -28, 2, 0, Math.PI*2);
        spaceCtx.fill();
        spaceCtx.beginPath();
        spaceCtx.arc(earthR + 8, 28, 2, 0, Math.PI*2);
        spaceCtx.fill();

        spaceCtx.restore();

        const obsX = cx + earthR * Math.cos(obsAngle);
        const obsY = cy + earthR * Math.sin(obsAngle);
        spaceCtx.beginPath();
        spaceCtx.arc(obsX, obsY, 3, 0, Math.PI*2);
        spaceCtx.fillStyle = "#ef4444";
        spaceCtx.fill();

        const hx = earthR + 8; 
        const hy_E = -38; 
        const hy_W = 38;  

        const ex = cx + hx * Math.cos(obsAngle) - hy_E * Math.sin(obsAngle);
        const ey = cy + hx * Math.sin(obsAngle) + hy_E * Math.cos(obsAngle);

        const wx = cx + hx * Math.cos(obsAngle) - hy_W * Math.sin(obsAngle);
        const wy = cy + hx * Math.sin(obsAngle) + hy_W * Math.cos(obsAngle);

        spaceCtx.font = "bold 13px Prompt";
        spaceCtx.textAlign = "center";
        spaceCtx.textBaseline = "middle";
        
        spaceCtx.strokeStyle = "#000000";
        spaceCtx.lineWidth = 3;

        spaceCtx.strokeText("ตะวันออก (E)", ex, ey);
        spaceCtx.fillStyle = "#bbf7d0"; 
        spaceCtx.fillText("ตะวันออก (E)", ex, ey);

        spaceCtx.strokeText("ตะวันตก (W)", wx, wy);
        spaceCtx.fillStyle = "#fca5a5"; 
        spaceCtx.fillText("ตะวันตก (W)", wx, wy);

        const mx = cx + orbitR * Math.cos(moonAngle);
        const my = cy + orbitR * Math.sin(moonAngle);
        
        spaceCtx.beginPath();
        spaceCtx.arc(mx, my, 16, Math.PI/2, 3*Math.PI/2);
        spaceCtx.fillStyle = "#f8fafc";
        spaceCtx.fill();
        spaceCtx.beginPath();
        spaceCtx.arc(mx, my, 16, -Math.PI/2, Math.PI/2);
        spaceCtx.fillStyle = "#222";
        spaceCtx.fill();
    }

    function drawMoonPhase(ctx, size, p) {
        ctx.clearRect(0,0,size,size);
        const r = size/2 - 2, c = size/2;
        
        ctx.beginPath(); ctx.arc(c,c,r,0,Math.PI*2); ctx.fillStyle="#1a1a1a"; ctx.fill();
        
        let cosV = Math.cos(p * 2 * Math.PI);
        ctx.fillStyle = "#f8fafc";
        
        if (p <= 0.5) {
            ctx.beginPath(); ctx.arc(c,c,r,-Math.PI/2, Math.PI/2); ctx.fill();
            if (p <= 0.25) {
                ctx.beginPath(); ctx.ellipse(c,c, Math.abs(cosV)*r, r, 0, -Math.PI/2, Math.PI/2);
                ctx.fillStyle = "#1a1a1a"; ctx.fill();
            } else {
                ctx.beginPath(); ctx.ellipse(c,c, Math.abs(cosV)*r, r, 0, Math.PI/2, -Math.PI/2);
                ctx.fillStyle = "#f8fafc"; ctx.fill();
            }
        } else {
            ctx.beginPath(); ctx.arc(c,c,r,Math.PI/2, -Math.PI/2); ctx.fill();
            if (p <= 0.75) {
                ctx.beginPath(); ctx.ellipse(c,c, Math.abs(cosV)*r, r, 0, -Math.PI/2, Math.PI/2);
                ctx.fillStyle = "#f8fafc"; ctx.fill();
            } else {
                ctx.beginPath(); ctx.ellipse(c,c, Math.abs(cosV)*r, r, 0, Math.PI/2, -Math.PI/2);
                ctx.fillStyle = "#1a1a1a"; ctx.fill();
            }
        }
    }

    function formatTime(h) {
        const hh = Math.floor(h).toString().padStart(2,'0');
        const mm = Math.floor((h % 1) * 60).toString().padStart(2,'0');
        return `${hh}:${mm}`;
    }

    function getLunarThai(d) {
        if(d < 1) return "แรม 15 ค่ำ (New Moon)";
        if(d <= 14.7) return `ขึ้น ${Math.round(d)} ค่ำ`;
        if(d <= 15.5) return `ขึ้น 15 ค่ำ (Full Moon)`;
        return `แรม ${Math.round(d - 14.7)} ค่ำ`;
    }

    function getPhaseName(d) {
        if (d < 1 || d > 28.5) return "New Moon (จันทร์ดับ)";
        if (d <= 6.5) return "Waxing Crescent (จันทร์เสี้ยวข้างขึ้น)";
        if (d <= 8.5) return "First Quarter (ขึ้น 8 ค่ำ)";
        if (d <= 13.5) return "Waxing Gibbous (จันทร์ค่อนดวงข้างขึ้น)";
        if (d <= 16) return "Full Moon (จันทร์เพ็ญ)";
        if (d <= 21) return "Waning Gibbous (จันทร์ค่อนดวงข้างแรม)";
        if (d <= 23) return "Third Quarter (แรม 8 ค่ำ)";
        return "Waning Crescent (จันทร์เสี้ยวข้างแรม)";
    }

    timeSlider.oninput = (e) => { hour = parseFloat(e.target.value); update(); };
    daySlider.oninput = (e) => { days = parseFloat(e.target.value); update(); };
    window.onresize = () => { resize(); update(); };

    setTimeout(init, 100);
</script>
